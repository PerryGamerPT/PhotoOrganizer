<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaTinder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(130% 90% at 0% 0%, rgba(63, 63, 70, 0.17), transparent 58%),
        radial-gradient(140% 90% at 100% 100%, rgba(39, 39, 42, 0.25), transparent 62%),
        #09090b;
      overflow: hidden;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    .card-shell {
      perspective: 900px;
    }

    .card {
      transition: transform 220ms ease, opacity 220ms ease, border-color 180ms ease;
      will-change: transform, opacity;
    }

    .card.out-pass {
      border-color: rgba(248, 113, 113, 0.95);
      transform: translateX(-54vw) rotate(-14deg) scale(0.95);
      opacity: 0;
    }

    .card.out-match {
      border-color: rgba(74, 222, 128, 0.95);
      transform: translateX(54vw) rotate(14deg) scale(0.95);
      opacity: 0;
    }

    .media-pending {
      opacity: 0;
    }

    .media-ready {
      opacity: 1;
      transition: opacity 180ms ease;
    }

    .skeleton {
      background:
        linear-gradient(110deg, rgba(39, 39, 42, 0.35) 8%, rgba(82, 82, 91, 0.26) 18%, rgba(39, 39, 42, 0.35) 33%),
        rgba(24, 24, 27, 0.75);
      background-size: 200% 100%;
      animation: wave 1.15s linear infinite;
    }

    .truncate-middle {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: rtl;
      text-align: left;
    }

    @keyframes wave {
      from {
        background-position-x: 180%;
      }
      to {
        background-position-x: -20%;
      }
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <main class="h-full w-full grid grid-rows-[auto_1fr_auto] place-items-center p-3 sm:p-4 gap-2">
    <header class="w-full max-w-6xl flex items-center justify-between gap-3">
      <div id="counter" class="text-[11px] sm:text-xs uppercase tracking-[0.12em] text-zinc-400 border border-zinc-700/80 bg-zinc-900/80 rounded-full px-3 py-1.5">
        0
      </div>
      <div class="flex items-center gap-2">
        <div id="verTag" class="text-[10px] text-zinc-500 border border-zinc-800 rounded-md px-2 py-1 bg-zinc-900/70"></div>
        <select id="lang" class="text-xs rounded-md bg-zinc-900 border border-zinc-700 text-zinc-100 px-2 py-1.5 outline-none focus:ring-2 focus:ring-sky-400/60">
          <option value="en">English</option>
          <option value="pt">Português</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
        </select>
      </div>
    </header>

    <section id="board" class="w-full h-full max-w-6xl grid place-items-center"></section>

    <footer id="controls" class="w-full max-w-6xl flex items-center justify-center gap-3 pb-1">
      <button id="btnExport" type="button" class="min-w-[92px] rounded-xl border border-zinc-700 bg-zinc-900 hover:bg-zinc-800 px-4 py-2 text-sm font-medium">Export</button>
      <button id="btnPass" type="button" class="min-w-[104px] rounded-xl border border-red-900/70 bg-zinc-900 hover:bg-zinc-800 px-4 py-2 text-sm font-semibold">Pass</button>
      <button id="btnMatch" type="button" class="min-w-[104px] rounded-xl border border-emerald-900/70 bg-zinc-900 hover:bg-zinc-800 px-4 py-2 text-sm font-semibold">Match</button>
    </footer>
  </main>

  <script>
    (() => {
      const APP_VERSION = "v1.3.0";
      const APP_COMMIT = "main-working";
      const STORAGE_KEY = "mediatinder-v2";
      const BUFFER_AHEAD = 20;
      const BUFFER_SIZE = BUFFER_AHEAD + 1;
      const MIN_BYTES = 50 * 1024;
      const SKIP_DIRS = ["windows", "program files", "appdata", "node_modules"];
      const PASS = "pass";
      const MATCH = "match";
      const IMG_EXT = new Set(["jpg", "jpeg", "png", "webp"]);
      const VID_EXT = new Set(["mp4", "mov", "webm"]);

      const I18N = {

        },
        pt: {

          setupTitle: "Escolhe as pastas de origem e destino",
          setupTxt: "A origem é lida de forma lazy para HDD antigo. O destino recebe cópias em tempo real no Match.",
          sourceBtn: "Selecionar Origem (HDD)",
          targetBtn: "Selecionar Destino (Salvos)",
          sourceReady: "Origem pronta",
          targetReady: "Destino pronto",
          startBtn: "Iniciar",
          pass: "Passar",
          match: "Match",
          export: "Exportar",
          openNew: "Abrir Novas Pastas",
          doneTitle: "Triagem concluída",
          doneTxt: "Podes exportar os selecionados em ZIP ou escolher novas pastas.",
          noneTitle: "Nenhum ficheiro válido encontrado",
          noneTxt: "Ficheiros abaixo de 50KB e pastas de sistema foram ignorados.",
          progress: "{seen} vistos • {match} match",
          pathLabel: "Atual",
          copying: "A copiar...",
          copied: "Guardado",
          copyErr: "Falha ao copiar",
          exporting: "A criar ZIP...",
          exportName: "mediatinder_backup.zip",
          exportEmpty: "Não há ficheiros match para exportar.",
          fsMissing: "Este navegador não suporta File System Access API.",
          zipMissing: "JSZip indisponível.",
          hint: "Teclado: Seta Esquerda = Passar, Seta Direita = Match",
          mediaLoad: "A carregar média...",
          srcNeed: "Seleciona as pastas de origem e destino.",
          selSource: "Pasta de origem selecionada",
          selTarget: "Pasta de destino selecionada"
        },
        fr: {
          title: "MediaTinder",
          setupTitle: "Choisissez les dossiers source et destination",
          setupTxt: "La source est scannée en lazy pour les HDD lents. La destination reçoit une copie en temps réel sur Match.",
          sourceBtn: "Choisir Source (HDD)",
          targetBtn: "Choisir Destination (Sauvegardés)",
          sourceReady: "Source prête",
          targetReady: "Destination prête",
          startBtn: "Démarrer",
          pass: "Passer",
          match: "Match",
          export: "Exporter",
          openNew: "Ouvrir de nouveaux dossiers",
          doneTitle: "Tri terminé",
          doneTxt: "Vous pouvez exporter les éléments en ZIP ou choisir d'autres dossiers.",
          noneTitle: "Aucun média valide trouvé",
          noneTxt: "Les fichiers sous 50KB et les dossiers système ont été ignorés.",
          progress: "{seen} vus • {match} match",
          pathLabel: "Actuel",
          copying: "Copie...",
          copied: "Sauvé",
          copyErr: "Échec de copie",
          exporting: "Création du ZIP...",
          exportName: "mediatinder_backup.zip",
          exportEmpty: "Aucun fichier match à exporter.",
          fsMissing: "Ce navigateur ne supporte pas File System Access API.",
          zipMissing: "JSZip indisponible.",
          hint: "Clavier: Flèche gauche = Passer, Flèche droite = Match",
          mediaLoad: "Chargement du média...",
          srcNeed: "Sélectionnez les dossiers source et destination.",
          selSource: "Dossier source sélectionné",
          selTarget: "Dossier destination sélectionné"
        },
        es: {
          title: "MediaTinder",
          setupTitle: "Elige carpetas de origen y destino",
          setupTxt: "El origen se escanea en modo lazy para HDD lentos. El destino recibe copias en tiempo real con Match.",
          sourceBtn: "Seleccionar Origen (HDD)",
          targetBtn: "Seleccionar Destino (Guardados)",
          sourceReady: "Origen listo",
          targetReady: "Destino listo",
          startBtn: "Iniciar",
          pass: "Pasar",
          match: "Match",
          export: "Exportar",
          openNew: "Abrir Nuevas Carpetas",
          doneTitle: "Revisión completada",
          doneTxt: "Puedes exportar los seleccionados en ZIP o elegir nuevas carpetas.",
          noneTitle: "No se encontraron medios válidos",
          noneTxt: "Se ignoraron archivos menores a 50KB y carpetas de sistema.",
          progress: "{seen} vistos • {match} match",
          pathLabel: "Actual",
          copying: "Copiando...",
          copied: "Guardado",
          copyErr: "Error de copia",
          exporting: "Creando ZIP...",
          exportName: "mediatinder_backup.zip",
          exportEmpty: "No hay archivos match para exportar.",
          fsMissing: "Este navegador no soporta File System Access API.",
          zipMissing: "JSZip no disponible.",
          hint: "Teclado: Flecha izquierda = Pasar, Flecha derecha = Match",
          mediaLoad: "Cargando medio...",
          srcNeed: "Selecciona origen y destino.",
          selSource: "Carpeta origen seleccionada",
          selTarget: "Carpeta destino seleccionada"
        }
      };

      const $ = {
        board: document.getElementById("board"),
        controls: document.getElementById("controls"),
        counter: document.getElementById("counter"),
        btnPass: document.getElementById("btnPass"),
        btnMatch: document.getElementById("btnMatch"),
        btnExport: document.getElementById("btnExport"),
        lang: document.getElementById("lang"),
        verTag: document.getElementById("verTag")
      };

      const st = {
        lang: detectLang(),
        source: null,
        target: null,
        stack: [],
        gen: null,
        queue: [],
        fillJob: null,
        seen: 0,
        matched: [],
        exhausted: false,
        busy: false,
        ready: false,
        lastPath: "",
        copyState: ""
      };

      function detectLang() {
        const raw = String(navigator.language || "en").toLowerCase();
        if (raw.startsWith("pt")) return "pt";
        if (raw.startsWith("fr")) return "fr";
        if (raw.startsWith("es")) return "es";
        return "en";
      }

      function t(key, vars = {}) {
        const pack = I18N[st.lang] || I18N.en;
        const base = pack[key] || I18N.en[key] || key;
        return Object.keys(vars).reduce((acc, k) => acc.replace(`{${k}}`, String(vars[k])), base);
      }

      function ext(name) {
        const i = name.lastIndexOf(".");
        return i < 0 ? "" : name.slice(i + 1).toLowerCase();
      }

      function mediaKind(name) {
        const e = ext(name);
        if (IMG_EXT.has(e)) return "image";
        if (VID_EXT.has(e)) return "video";
        return "";
      }

      function joinRel(base, seg) {
        return base ? `${base}/${seg}` : seg;
      }

      function shouldSkip(rel) {
        const p = `/${String(rel || "").toLowerCase()}/`;
        return SKIP_DIRS.some((d) => p.includes(`/${d}/`));
      }

      function setVersionTag() {
        $.verTag.textContent = `${APP_VERSION} • ${APP_COMMIT}`;
      }

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ lang: st.lang, seen: st.seen, matched: st.matched }));
      }

      function restore() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function updateStaticTexts() {
        document.title = t("title");
        $.btnPass.textContent = t("pass");
        $.btnMatch.textContent = t("match");
        $.btnExport.textContent = t("export");
        updateCounter();
      }

      function updateCounter() {
        $.counter.textContent = t("progress", { seen: st.seen, match: st.matched.length });
      }

      async function resolveDir(root, rel) {
        if (!rel) return root;
        const parts = rel.split("/").filter(Boolean);
        let dir = root;
        for (const p of parts) dir = await dir.getDirectoryHandle(p);
        return dir;
      }

      async function getFileByPath(root, rel) {
        const i = rel.lastIndexOf("/");
        const dirRel = i < 0 ? "" : rel.slice(0, i);
        const name = i < 0 ? rel : rel.slice(i + 1);
        const dir = await resolveDir(root, dirRel);
        const handle = await dir.getFileHandle(name);
        return handle.getFile();
      }

      async function copyToTarget(item) {
        if (!st.target) return;
        st.copyState = t("copying");
        updatePathLabel();
        try {
          const file = item.file || await item.handle.getFile();
          const out = await st.target.getFileHandle(file.name, { create: true });
          const writable = await out.createWritable();
          await writable.write(file);
          await writable.close();
          st.copyState = t("copied");
        } catch {
          st.copyState = t("copyErr");
        }
        updatePathLabel();
      }

      async function* walkMedia(ctx) {
        while (ctx.stack.length) {
          const node = ctx.stack.pop();
          for await (const [name, handle] of node.handle.entries()) {
            const rel = joinRel(node.rel, name);
            if (shouldSkip(rel)) continue;
            if (handle.kind === "directory") {
              ctx.stack.push({ rel, handle });
              continue;
            }
            const kind = mediaKind(name);
            if (!kind) continue;
            yield { rel, handle, kind };
          }
        }
      }

      async function fillQueue(target = BUFFER_SIZE) {
        if (!st.gen || st.exhausted) return;
        while (st.queue.length < target && !st.exhausted) {
          const next = await st.gen.next();
          if (next.done) {
            st.exhausted = true;
            break;
          }
          const item = next.value;
          try {
            const file = await item.handle.getFile();
            if (file.size < MIN_BYTES) continue;
            const url = URL.createObjectURL(file);
            st.queue.push({ ...item, file, url });
          } catch {
          }
        }
      }

      function maintainQueue(target = BUFFER_SIZE) {
        if (st.fillJob) return st.fillJob;
        st.fillJob = (async () => {
          try {
            await fillQueue(target);
          } finally {
            st.fillJob = null;
            if (st.ready && !st.exhausted && st.queue.length < target) queueMicrotask(() => maintainQueue(target));
          }
        })();
        return st.fillJob;
      }

      function releaseItem(item) {
        if (!item || !item.url) return;
        try {
          URL.revokeObjectURL(item.url);
        } catch {
        }
      }

      function releaseQueue() {
        for (const item of st.queue) releaseItem(item);
        st.queue = [];
      }

      function hideControls() {
        $.controls.classList.add("hidden");
      }

      function showControls() {
        $.controls.classList.remove("hidden");
      }

      function setupScreen() {
        const fsOk = typeof window.showDirectoryPicker === "function";
        $.board.innerHTML = `
          <div class="w-full max-w-2xl rounded-2xl border border-zinc-800 bg-zinc-900/80 p-6 sm:p-7 shadow-2xl">
            <h1 class="text-lg sm:text-xl font-semibold text-zinc-100">${t("setupTitle")}</h1>
            <p class="mt-2 text-sm text-zinc-400 leading-relaxed">${fsOk ? t("setupTxt") : t("fsMissing")}</p>
            <p class="mt-2 text-xs text-zinc-500">${t("hint")}</p>
            <div class="mt-5 grid gap-3 sm:grid-cols-2">
              <button id="pickSource" type="button" ${fsOk ? "" : "disabled"} class="rounded-xl border border-zinc-700 bg-zinc-950 hover:bg-zinc-800 px-4 py-2.5 text-sm font-medium disabled:opacity-50">${t("sourceBtn")}</button>
              <button id="pickTarget" type="button" ${fsOk ? "" : "disabled"} class="rounded-xl border border-zinc-700 bg-zinc-950 hover:bg-zinc-800 px-4 py-2.5 text-sm font-medium disabled:opacity-50">${t("targetBtn")}</button>
            </div>
            <div class="mt-3 text-xs text-zinc-500 space-y-1">
              <div id="sourceState">-</div>
              <div id="targetState">-</div>
            </div>
            <div class="mt-5">
              <button id="startFlow" type="button" ${fsOk ? "" : "disabled"} class="rounded-xl border border-sky-800/80 bg-sky-950/40 hover:bg-sky-900/30 px-4 py-2.5 text-sm font-semibold disabled:opacity-50">${t("startBtn")}</button>
            </div>
          </div>
        `;

        hideControls();

        const sourceState = document.getElementById("sourceState");
        const targetState = document.getElementById("targetState");
        const refreshSetupState = () => {
          sourceState.textContent = st.source ? `• ${t("selSource")}` : "-";
          targetState.textContent = st.target ? `• ${t("selTarget")}` : "-";
        };

        document.getElementById("pickSource").addEventListener("click", async () => {
          try {
            st.source = await window.showDirectoryPicker({ mode: "read" });
          } catch {
          }
          refreshSetupState();
        });

        document.getElementById("pickTarget").addEventListener("click", async () => {
          try {
            st.target = await window.showDirectoryPicker({ mode: "readwrite" });
          } catch {
          }
          refreshSetupState();
        });

        document.getElementById("startFlow").addEventListener("click", () => {
          if (!st.source || !st.target) {
            alert(t("srcNeed"));
            return;
          }
          bootstrapFlow();
        });

        refreshSetupState();
      }

      function doneScreen() {
        $.board.innerHTML = `
          <div class="w-full max-w-2xl rounded-2xl border border-zinc-800 bg-zinc-900/80 p-6 sm:p-7 shadow-2xl text-center">
            <h2 class="text-lg sm:text-xl font-semibold">${t("doneTitle")}</h2>
            <p class="mt-2 text-sm text-zinc-400">${t("doneTxt")}</p>
            <div class="mt-5 flex flex-wrap items-center justify-center gap-3">
              <button id="doneExport" type="button" class="rounded-xl border border-zinc-700 bg-zinc-950 hover:bg-zinc-800 px-4 py-2.5 text-sm font-medium">${t("export")}</button>
              <button id="doneReset" type="button" class="rounded-xl border border-zinc-700 bg-zinc-950 hover:bg-zinc-800 px-4 py-2.5 text-sm font-medium">${t("openNew")}</button>
            </div>
          </div>
        `;
        hideControls();
        document.getElementById("doneExport").addEventListener("click", exportZip);
        document.getElementById("doneReset").addEventListener("click", resetAll);
      }

      function noneScreen() {
        $.board.innerHTML = `
          <div class="w-full max-w-2xl rounded-2xl border border-zinc-800 bg-zinc-900/80 p-6 sm:p-7 shadow-2xl text-center">
            <h2 class="text-lg sm:text-xl font-semibold">${t("noneTitle")}</h2>
            <p class="mt-2 text-sm text-zinc-400">${t("noneTxt")}</p>
            <div class="mt-5">
              <button id="noneReset" type="button" class="rounded-xl border border-zinc-700 bg-zinc-950 hover:bg-zinc-800 px-4 py-2.5 text-sm font-medium">${t("openNew")}</button>
            </div>
          </div>
        `;
        hideControls();
        document.getElementById("noneReset").addEventListener("click", resetAll);
      }

      function cardHtml(item) {
        const media = item.kind === "video"
          ? `<video id="activeMedia" class="w-full h-full object-contain media-pending" src="${item.url}" controls autoplay muted playsinline preload="metadata"></video>`
          : `<img id="activeMedia" class="w-full h-full object-contain media-pending" src="${item.url}" alt="${item.rel.replace(/"/g, "")}" draggable="false" />`;

        return `
          <div class="card-shell w-full h-full max-h-[78vh] max-w-5xl">
            <article id="card" class="card relative w-full h-full rounded-2xl border border-zinc-700 bg-zinc-900/85 overflow-hidden shadow-2xl">
              ${media}
              <div id="loader" class="absolute inset-0 grid place-items-center bg-zinc-950/46 backdrop-blur-[1px]">
                <div class="absolute w-[88%] h-[72%] rounded-xl border border-zinc-700 skeleton"></div>
                <div class="relative z-10 flex flex-col items-center gap-3">
                  <span class="h-11 w-11 rounded-full border-4 border-zinc-600 border-t-sky-400 animate-spin"></span>
                  <span class="text-[11px] uppercase tracking-[0.12em] text-zinc-300">${t("mediaLoad")}</span>
                </div>
              </div>
              <div class="absolute left-3 right-3 bottom-3 rounded-lg border border-zinc-700/80 bg-zinc-950/78 px-3 py-2 backdrop-blur-sm">
                <div class="text-[10px] uppercase tracking-[0.12em] text-zinc-400">${t("pathLabel")}</div>
                <div id="pathTxt" class="truncate-middle text-xs text-zinc-200" title="${item.rel.replace(/"/g, "")}">${item.rel}</div>
                <div id="copyState" class="mt-0.5 text-[10px] text-zinc-500">${st.copyState || ""}</div>
              </div>
            </article>
          </div>
        `;
      }

      function updatePathLabel() {
        const pathTxt = document.getElementById("pathTxt");
        const copyTxt = document.getElementById("copyState");
        if (pathTxt) {
          pathTxt.textContent = st.lastPath || "";
          pathTxt.title = st.lastPath || "";
        }
        if (copyTxt) copyTxt.textContent = st.copyState || "";
      }

      function bindMediaEvents(item) {
        const media = document.getElementById("activeMedia");
        const loader = document.getElementById("loader");
        if (!media) return;

        const reveal = () => {
          media.classList.remove("media-pending");
          media.classList.add("media-ready");
          if (loader) {
            loader.classList.add("opacity-0");
            setTimeout(() => {
              if (loader && loader.parentNode) loader.remove();
            }, 180);
          }
        };

        const fail = () => autoSkipBroken(item.rel);

        if (item.kind === "video") {
          media.addEventListener("loadeddata", reveal, { once: true });
          media.addEventListener("error", fail, { once: true });
        } else {
          media.addEventListener("load", reveal, { once: true });
          media.addEventListener("error", fail, { once: true });
        }
      }

      function renderCard() {
        const item = st.queue[0];
        if (!item) {
          if (st.exhausted) doneScreen();
          else noneScreen();
          updateCounter();
          return;
        }

        st.lastPath = item.rel;
        $.board.innerHTML = cardHtml(item);
        showControls();
        updateCounter();
        updatePathLabel();
        bindMediaEvents(item);
        maintainQueue(BUFFER_SIZE);
      }

      async function bootstrapFlow() {
        releaseQueue();
        st.stack = [{ rel: "", handle: st.source }];
        st.gen = walkMedia(st);
        st.fillJob = null;
        st.ready = true;
        st.exhausted = false;
        st.busy = false;
        st.seen = 0;
        st.matched = [];
        st.lastPath = "";
        st.copyState = "";
        updateCounter();

        await fillQueue(1);
        if (!st.queue.length && st.exhausted) {
          noneScreen();
          return;
        }

        renderCard();
        maintainQueue(BUFFER_SIZE);
      }

      async function autoSkipBroken(expectedRel) {
        if (!st.ready || st.busy || !st.queue.length) return;
        const head = st.queue[0];
        if (!head || head.rel !== expectedRel) return;

        st.busy = true;
        st.lastPath = head.rel;
        releaseItem(st.queue.shift());
        await fillQueue(BUFFER_SIZE);
        renderCard();
        st.busy = false;
      }

      async function swipe(kind) {
        if (!st.ready || st.busy || !st.queue.length) return;

        st.busy = true;
        const head = st.queue[0];
        const card = document.getElementById("card");
        if (!card) {
          st.busy = false;
          return;
        }

        if (kind === MATCH) {
          st.matched.push(head.rel);
          await copyToTarget(head);
        } else {
          st.copyState = "";
        }

        card.classList.add(kind === MATCH ? "out-match" : "out-pass");

        setTimeout(async () => {
          st.seen += 1;
          st.lastPath = head.rel;
          releaseItem(st.queue.shift());
          persist();
          await fillQueue(BUFFER_SIZE);
          renderCard();
          st.busy = false;
        }, 230);
      }

      async function exportZip() {
        if (!st.matched.length) {
          alert(t("exportEmpty"));
          return;
        }
        if (!window.JSZip) {
          alert(t("zipMissing"));
          return;
        }

        const prev = $.btnExport.textContent;
        $.btnExport.textContent = t("exporting");
        $.btnExport.disabled = true;

        try {
          const zip = new JSZip();
          const seen = new Map();

          for (const rel of st.matched) {
            try {
              const file = await getFileByPath(st.source, rel);
              const base = rel.split("/").pop() || "media";
              const idx = seen.get(base) || 0;
              seen.set(base, idx + 1);
              const name = idx === 0
                ? base
                : `${base.slice(0, base.lastIndexOf(".")) || base}_${idx}${base.includes(".") ? "." + base.split(".").pop() : ""}`;
              zip.file(name, file);
            } catch {
            }
          }

          const blob = await zip.generateAsync({
            type: "blob",
            compression: "DEFLATE",
            compressionOptions: { level: 4 }
          });

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = t("exportName");
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } finally {
          $.btnExport.disabled = false;
          $.btnExport.textContent = prev || t("export");
        }
      }

      function resetAll() {
        releaseQueue();
        st.source = null;
        st.target = null;
        st.stack = [];
        st.gen = null;
        st.fillJob = null;
        st.ready = false;
        st.exhausted = false;
        st.busy = false;
        st.seen = 0;
        st.matched = [];
        st.lastPath = "";
        st.copyState = "";
        persist();
        updateCounter();
        setupScreen();
      }

      function bindCoreEvents() {
        $.btnPass.addEventListener("click", () => swipe(PASS));
        $.btnMatch.addEventListener("click", () => swipe(MATCH));
        $.btnExport.addEventListener("click", exportZip);

        document.addEventListener("keydown", (ev) => {
          if (!st.ready) return;
          const tag = document.activeElement?.tagName || "";
          if (["INPUT", "SELECT", "TEXTAREA"].includes(tag)) return;
          if (ev.key === "ArrowLeft") {
            ev.preventDefault();
            swipe(PASS);
          }
          if (ev.key === "ArrowRight") {
            ev.preventDefault();
            swipe(MATCH);
          }
        });

        $.lang.addEventListener("change", () => {
          st.lang = $.lang.value in I18N ? $.lang.value : "en";
          persist();
          updateStaticTexts();
          if (!st.ready) setupScreen();
          else renderCard();
        });
      }

      function init() {
        const snap = restore();
        if (snap && snap.lang && snap.lang in I18N) st.lang = snap.lang;
        $.lang.value = st.lang;

        setVersionTag();
        updateStaticTexts();
        bindCoreEvents();
        setupScreen();
      }

      window.addEventListener("beforeunload", persist);
      init();
    })();
  </script>
</body>
</html>
